version: "3.9"

services:

  mongo:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: CashCore
      MONGO_INITDB_ROOT_PASSWORD: number1best_team

  app:
    build:
      context: .
      args:
        - DEV=true
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
    command: >
      sh -c "python manage.py runserver 0.0.0.0:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=rootdb
      - DB_USER=rootuser
      - DB_PASSWORD=password1234
    depends_on:
      - db

  db:
    image: postgres:13-alpine
    volumes:
      - dev-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=devdb
      - POSTGRES_DB_USER=devuser
      - POSTGRES_DB_PASSWORD=changeme

volumes:
  dev-db-data: